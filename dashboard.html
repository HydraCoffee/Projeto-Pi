<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydraCoffe – Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="icon" href="./img/LOGO.png">

</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">HydraCoffe</div>

    <nav class="sidebar-nav">

        <div class="hello">
                <h3>Olá, <span id="b_usuario">Usuário</span>!</h3>
            </div>

        <button class="nav-item ativo" onclick="mostrarPagina('geral')">
            Medição Geral
        </button>

        <button class="nav-item" onclick="toggleSubmenu()">
            Hectares
            <span id="setaHectares">▶</span>
        </button>

        <!-- Os botões dos hectares aparecem aqui quando o usuário clica em "Hectares" -->
        <div id="submenuHectares" class="submenu">
            <!-- Gerado automaticamente pelo JS com base no array "hectares" lá embaixo -->
        </div>

        <button class="nav-item">
            Sair
        </button>
    </nav>

    <div class="sidebar-footer">v1.0 · HydraCoffe</div>
</aside>

<main class="conteudo">
    <div class="page-header">
        <div>
            <h2 id="tituloPagina"></h2>
            <p class="page-subtitulo" id="subtituloPagina"></p>
        </div>
        <span class="data-hora" id="dataHora"></span>
    </div>

    <div class="status-bar">
        <div class="status-dot"></div>
        Última leitura às <span id="ultimaLeitura">--:--</span>
    </div>

    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="graficos-grid">
        <div class="grafico-card">
            <div class="grafico-titulo">Umidade ao Longo do Dia</div>
            <div class="grafico-subtitulo">Meta: 60%</div>
            <canvas id="graficoHora"></canvas>
        </div>
        <div class="grafico-card">
            <div class="grafico-titulo">Umidade Média Mensal</div>
            <div class="grafico-subtitulo">Últimos 5 meses</div>
            <canvas id="graficoMes"></canvas>
        </div>
    </div>
</main>


<script>
     b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function obterDadosGrafico(idSetor) {
        const resposta = fetch(`/dashboard/hectare/${idSetor}`);

        if (resposta.ok) {
            const dadosDoBanco = resposta.json();

            dadosDoBanco.reverse();

            const horas = dadosDoBanco.map(registro => registro.momento_grafico);
            const valoresReais =dadosDoBanco.map(registro => registro.umidade);

            const valoresHectare1 = valoresReais;

            const valoresHectare2 =valoresReais.map(() => {
                return Math.floor(Math.random() * 9) + 66;
            });

            const valoresHectare3 =valoresReais.map(() => {
                return Math.floor(Math.random() * 14) + 45;
            });

            let valoresFinaisGrafico;
            if (idSetor == 1) valoresFinaisGrafico = valoresHectare1;
        
            console.log(`Renderizando Setor ${idSetor} com os dados: valoresFinaisdoGrafico`);
        }
    }

</script>

</body>
</html>
