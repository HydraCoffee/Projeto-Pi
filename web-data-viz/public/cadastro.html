<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HydraCoffee | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="icon" href="./assets/img/LOGO.png">
</head>

<body onload="listar()">

  <a href="./index.html" class="botao-voltar-pagina">
    Voltar para a página inicial
  </a>

  <main class="pagina-cadastro">

    <section class="card-cadastro-principal">

      <div class="lado-formulario">

        <div class="marca">
          <h1>HydraCoffee</h1>
          <p>Monitoramento Inteligente de Umidade</p>
        </div>

        <div class="alerta_erro">
          <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
          </div>
        </div>

        <div class="caixa-cadastro">
          <h2>Crie sua conta</h2>

          <p class="subtitulo">
            Cadastre-se para acessar os dados de umidade e acompanhar sua plantação.
          </p>

          <div class="formulario">

            <div class="campo">
              <span>Código de ativação</span>
              <input id="codigo_input" type="text" placeholder="Insira aqui seu código" />
            </div>

            <div class="campo">
              <span>Nome</span>
              <input id="nome_input" type="text" placeholder="Seu nome" />
            </div>

            <div class="campo">
              <span>E-mail</span>
              <input id="email_input" type="email" placeholder="meuemail@provedor.com" />
            </div>

            <div class="campo">
              <span>Senha</span>
              <input id="senha_input" type="password" placeholder="No mínimo 8 caracteres" />
            </div>

            <div class="campo">
              <span>Confirmação da senha</span>
              <input id="confirmacao_senha_input" type="password" placeholder="Confirme sua senha" />
            </div>

            <button class="botao" onclick="cadastrar()">Cadastrar</button>

          </div>

          <div id="div_aguardar" class="loading-div">
            <img src="./assets/circle-loading.gif" id="loading-gif" />
          </div>

            Já possui uma conta?
            <a href="login.html">Entrar</a>
          </p>
        </div>

      </div>

    </section>

  </main>

</html>

<script>
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos para continuar.";
      return false;
    }

    if (!emailVar.includes("@")) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Digite um e-mail válido.";
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não coincidem.";
      return false;
    }

    if (senhaVar.length < 8) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "A senha precisa ter pelo menos 8 caracteres.";
      return false;
    }

    setInterval(sumirMensagem, 5000);

    var codigoValido = false;

    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo == codigoVar) {

        idEmpresaVincular = listaEmpresasCadastradas[i].idEmpresa;

        codigoValido = true;
        console.log("Código de ativação válido.");
        break;
      }
    }

    if (codigoValido == false) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Código de ativação inválido.";
      return false;
    }

    fetch("/funcionarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);

        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Não foi possível realizar o cadastro.";
      });

    return false;
  }

  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
