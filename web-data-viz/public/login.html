<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>HydraCoffee | Login</title>

  <link rel="stylesheet" type="text/css" href="./css/cadastroLogin.css">
  <link rel="icon" href="./assets/img/LOGO.png">
</head>

<body>

  <main class="pagina-login">

    <section class="card-login-principal">

      <div class="lado-formulario">

        <a href="./index.html" class="botao-voltar-pagina">
          Voltar para a página inicial
        </a>

        <div class="marca">
          <h1>HydraCoffee</h1>
          <p>Monitoramento Inteligente de Umidade</p>
        </div>

        <div class="caixa-login">

          <h2>Login</h2>

          <p class="subtitulo">
            Acesse sua conta para acompanhar os dados do sistema.
          </p>

          <form class="formulario">

            <div class="campo">
              <span>E-mail</span>
              <input type="email" id="email_input" placeholder="Digite seu e-mail">
            </div>

            <div class="campo">
              <span>Senha</span>
              <input type="password" id="senha_input" placeholder="Digite sua senha">
            </div>

            <div class="campo">
              <span>Código</span>
              <input type="text" id="codigo_input" placeholder="Digite o código da sua empresa"> ">
            </div>

            <input class="botao" type="button" value="Entrar" onclick="entrar(event)">

          </form>

          <p class="link-cadastro">
            Ainda não possui uma conta?
            <a href="./cadastro.html">Cadastre-se</a>
          </p>

        </div>
      </div>

      <div class="lado-imagem"></div>

    </section>

  </main>

</body>

</html>

<script>
  function entrar(event) {
    event.preventDefault();

    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var codigoVar = codigo_input.value;

    if (emailVar == "" || senhaVar == "" || codigoVar == "") {
      alert("Por favor, preencha todos os campos.");
      return false;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("Código digitado:", codigoVar);

    fetch("/funcionarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
        codigoServer: codigoVar
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!")

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log(JSON.stringify(json));

          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.NOME_USUARIO = json.nome;
          sessionStorage.ID_USUARIO = json.id;
          sessionStorage.FK_EMPRESA = json.fkEmpresa;

          alert(`Bem-vindo(a), ${json.nome}! Login realizado com sucesso.`);

          setTimeout(function () {
            if (json.tipo === 'admin') {
              window.location = "http://localhost:4000";
            } else {
              window.location = "./dashboard.html";
            }
          }, 1000);

        });

      } else {
        console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error(texto);
          alert(texto);
        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })

    return false;
  }
</script>
