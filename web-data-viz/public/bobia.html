<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobIA</title>
    <link rel="stylesheet" href="./css/bobia.css" type="text/css">
    <link rel="icon" href="./assets/img/LOGO.png">
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-logo">Hydracoffee</div>

        <nav class="sidebar-nav">
            <div class="sidebar-hello">
                <h3>Olá, <span id="nomeUsuario">Admin</span>!</h3>
            </div>

            <button class="nav-item btn-manual" onclick="baixarManual()">
                📄 Baixar Manual
            </button>

            <button class="nav-item btn-sair" onclick="sair()">
                🚪 Sair
            </button>
        </nav>

        <div class="sidebar-footer">v1.0 · MeuProjeto</div>
    </aside>

    <div id="container">
        <h1>BobIA</h1>
        <textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
        <br><br>
        <button onclick="gerarResposta()">Gerar Resposta</button>
        <h3>Resposta da IA:</h3>
        <div id="resposta"></div>
    </div>

    <script src="./js/sessao.js"></script>
    <script>

        async function gerarResposta() {
            const pergunta = document.getElementById('pergunta').value;

            const response = await fetch('/perguntar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pergunta })
            });

            const data = await response.json();

            resposta.style.display = 'block';
            document.getElementById('resposta').innerText = data.resultado;
        }

        function baixarManual() {
            const link = document.createElement('a');
            link.href = 'SafraControl_Manual_Instalacao.pdf';
            link.download = 'SafraControl_Manual_Instalacao.pdf';
            link.click();
        }

        function sair() {
            sessionStorage.clear();
            window.location.href = './index.html';
        }

    </script>

</body>

</html>
