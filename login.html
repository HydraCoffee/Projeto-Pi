<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login </title>
    <link rel="stylesheet" type="text/css" href="./css/cadastroLogin.css">
</head>
<body>
    
    <img src="./img/logotipo.2.png" class="logo">
    
    <div class="slogan">
        <span>A cafeicultura inteligente começa aqui!</span>
    </div>
    <div class="container-principal">
        <div class="container-form">
            <h3>Login</h3>
            <form>

                <input type="email" id="email" placeholder="Email:"><br><br>

                <input type="password" id="senha" placeholder="Senha:"><br><br>

                <input type="submit" value="Logar" onclick="Logar(); return false">

            </form>
        </div>
    </div>

</body>
<script>
    function Logar(){
        let email = document.getElementById('email').value;
        let senha = document.getElementById('senha').value;

        if(email == 'admin@gmail.com' && senha == 'admin1'){
            alert("login Realizado Com Sucesso!!");
            location.href = "./dashboard.html";
        }else{
            alert("Erro ao Logar!!");
        }
    }



</script>
</html>
